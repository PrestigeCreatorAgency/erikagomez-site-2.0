<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erika Gomez</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#070707;
  --surface:#111;
  --surface2:#181818;
  --red:#C0392B;
  --red-bright:#E63946;
  --gold:#C9A96E;
  --white:#F5EFE6;
  --gray:#777;
  --border:rgba(255,255,255,0.07);
}
html{scroll-behavior:smooth;}
body{
  background:var(--black);
  color:var(--white);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── HERO ── */
.hero{
  position:relative;
  width:100%;
  height:100svh;
  min-height:600px;
  max-height:900px;
  overflow:hidden;
}

.hero-bg{
  position:absolute;
  inset:0;
  background:#1a0a00;
  background-image:
    radial-gradient(ellipse at 30% 60%, rgba(192,57,43,0.25) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 20%, rgba(201,169,110,0.1) 0%, transparent 45%);
}

.hero-photo{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
  opacity:0;
  transition:opacity 1s ease;
}
.hero-photo.loaded{opacity:1;}

.hero-placeholder{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
}
.hero-placeholder-icon{
  width:80px;height:80px;
  border-radius:50%;
  border:2px dashed rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;
}
.hero-placeholder p{font-size:12px;color:rgba(255,255,255,0.2);letter-spacing:2px;text-transform:uppercase;}

/* Gradient overlay */
.hero-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(7,7,7,0.1) 0%,
    rgba(7,7,7,0) 30%,
    rgba(7,7,7,0.3) 60%,
    rgba(7,7,7,0.92) 100%
  );
}

/* Grain */
.hero::after{
  content:'';
  position:absolute;
  inset:0;
  opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events:none;
}

.hero-content{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:0 24px 32px;
  text-align:center;
}

.hero-badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:40px;
  padding:6px 14px 6px 10px;
  margin-bottom:16px;
  font-size:11px;
  color:rgba(255,255,255,0.6);
  letter-spacing:2px;
  text-transform:uppercase;
}

.live-dot{
  width:7px;height:7px;
  border-radius:50%;
  background:var(--red-bright);
  animation:pulse 2s ease-in-out infinite;
  flex-shrink:0;
}

@keyframes pulse{
  0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(230,57,70,0.4);}
  50%{opacity:0.6;box-shadow:0 0 0 6px rgba(230,57,70,0);}
}

.hero-name{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(52px,14vw,88px);
  font-weight:700;
  line-height:0.9;
  letter-spacing:-1px;
  color:var(--white);
  margin-bottom:4px;
}

.hero-name em{
  color:var(--red-bright);
  font-style:italic;
}

.hero-handle{
  font-size:11px;
  color:rgba(255,255,255,0.35);
  letter-spacing:4px;
  text-transform:uppercase;
  margin-bottom:20px;
}

/* Social icons row */
.social-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:28px;
}

.social-icon{
  width:44px;height:44px;
  border-radius:50%;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;
  text-decoration:none;
  transition:background 0.2s, transform 0.2s, border-color 0.2s;
  cursor:pointer;
}

.social-icon:hover{
  background:rgba(255,255,255,0.12);
  border-color:rgba(255,255,255,0.25);
  transform:translateY(-2px);
}

/* Main CTA */
.hero-cta{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:16px 32px;
  background:var(--red-bright);
  border-radius:50px;
  font-size:14px;
  font-weight:500;
  color:#fff;
  text-decoration:none;
  letter-spacing:0.5px;
  transition:background 0.2s, transform 0.2s;
  max-width:320px;
  margin:0 auto;
}

.hero-cta:hover{background:#ff4757;transform:scale(1.02);}

/* Scroll indicator */
.scroll-hint{
  position:absolute;
  bottom:16px;left:50%;
  transform:translateX(-50%);
  font-size:10px;
  color:rgba(255,255,255,0.2);
  letter-spacing:2px;
  text-transform:uppercase;
  animation:bounce 2s ease-in-out infinite;
}

@keyframes bounce{
  0%,100%{transform:translateX(-50%) translateY(0);}
  50%{transform:translateX(-50%) translateY(6px);}
}

/* ── CONTENT SECTION ── */
.section{
  padding:48px 20px;
  max-width:600px;
  margin:0 auto;
}

.section-label{
  font-size:10px;
  color:var(--gray);
  letter-spacing:4px;
  text-transform:uppercase;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:12px;
}

.section-label::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}

/* OF Cards */
.of-cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:12px;
}

.of-card{
  position:relative;
  border-radius:16px;
  overflow:hidden;
  aspect-ratio:3/4;
  background:var(--surface);
  border:1px solid var(--border);
  text-decoration:none;
  display:block;
  transition:transform 0.3s ease, border-color 0.3s;
}

.of-card:hover{
  transform:translateY(-4px);
  border-color:rgba(255,255,255,0.15);
}

.of-card-photo{
  width:100%;height:100%;
  object-fit:cover;
  display:none;
}

.of-card-photo.loaded{display:block;}

.of-card-placeholder{
  width:100%;height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);
}

.of-card-blur{
  position:absolute;
  inset:0;
  backdrop-filter:blur(18px);
  background:rgba(7,7,7,0.55);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:backdrop-filter 0.3s;
}

.of-card:hover .of-card-blur{backdrop-filter:blur(14px);}

.of-card-lock{
  width:36px;height:36px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
}

.of-card-text{
  font-size:11px;
  color:rgba(255,255,255,0.6);
  letter-spacing:1px;
  text-transform:uppercase;
  text-align:center;
  padding:0 12px;
}

.of-card.primary-card{
  grid-column:1/-1;
  aspect-ratio:16/9;
}

.of-card.primary-card .of-card-blur{
  background:rgba(192,57,43,0.6);
}

.of-card-badge{
  position:absolute;
  top:12px;left:12px;
  background:var(--red-bright);
  color:#fff;
  font-size:9px;
  font-weight:500;
  letter-spacing:2px;
  text-transform:uppercase;
  padding:4px 10px;
  border-radius:20px;
}

.of-card-badge.gold{
  background:linear-gradient(135deg,#b8860b,#daa520);
  color:#1a1000;
}

/* Link buttons */
.link-buttons{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.link-btn{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 20px;
  border-radius:14px;
  background:var(--surface);
  border:1px solid var(--border);
  text-decoration:none;
  transition:transform 0.2s, border-color 0.2s, background 0.2s;
  overflow:hidden;
}

.link-btn::before{
  content:'';
  position:absolute;
  left:0;top:0;
  width:3px;height:100%;
  background:var(--btn-color, var(--red));
  transition:width 0.3s;
}

.link-btn:hover{
  transform:translateX(4px);
  border-color:var(--btn-color, var(--red));
  background:rgba(255,255,255,0.03);
}

.link-btn:hover::before{width:5px;}

.btn-inner{display:flex;align-items:center;gap:14px;}

.btn-icon{
  width:38px;height:38px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  flex-shrink:0;
}

.btn-label{
  font-size:14px;
  font-weight:500;
  color:var(--white);
}

.btn-sub{
  font-size:11px;
  color:var(--gray);
  margin-top:1px;
}

.btn-arrow{
  color:var(--gray);
  font-size:16px;
  transition:transform 0.2s, color 0.2s;
}

.link-btn:hover .btn-arrow{
  transform:translateX(3px);
  color:var(--btn-color, var(--red));
}

/* Gallery */
.gallery-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.gallery-item{
  position:relative;
  border-radius:12px;
  overflow:hidden;
  aspect-ratio:3/4;
  background:var(--surface);
  cursor:pointer;
  transition:transform 0.3s;
}

.gallery-item:nth-child(3n+1){aspect-ratio:3/4;}
.gallery-item:nth-child(3n+2){aspect-ratio:3/4;}
.gallery-item:first-child{
  grid-column:1/-1;
  aspect-ratio:4/3;
}

.gallery-item:hover{transform:scale(1.01);}

.gallery-photo{
  width:100%;height:100%;
  object-fit:cover;
  display:none;
}

.gallery-photo.loaded{display:block;}

.gallery-placeholder{
  width:100%;height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);
  font-size:11px;
  color:rgba(255,255,255,0.15);
  letter-spacing:1px;
  text-transform:uppercase;
}

.gallery-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(7,7,7,0.6) 0%, transparent 50%);
  opacity:0;
  transition:opacity 0.3s;
}

.gallery-item:hover .gallery-overlay{opacity:1;}

/* Footer */
.site-footer{
  text-align:center;
  padding:32px 24px 48px;
  font-size:10px;
  color:rgba(255,255,255,0.15);
  letter-spacing:2px;
  text-transform:uppercase;
}

/* Animations */
.fade-up{
  opacity:0;
  transform:translateY(24px);
  transition:opacity 0.7s ease, transform 0.7s ease;
}

.fade-up.visible{
  opacity:1;
  transform:translateY(0);
}

/* Shimmer loading */
.shimmer{
  background:linear-gradient(90deg,#1a1a1a 25%,#222 50%,#1a1a1a 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
}

@keyframes shimmer{to{background-position:-200% 0;}}

@media(max-width:380px){
  .hero-name{font-size:48px;}
  .of-cards{grid-template-columns:1fr;}
  .of-card.primary-card{grid-column:auto;}
}
</style>
</head>
<body>

<!-- ── HERO ── -->
<section class="hero" id="hero">
  <div class="hero-bg"></div>
  <div class="hero-placeholder" id="heroPlaceholder">
    <div class="hero-placeholder-icon">📷</div>
    <p>Hero photo goes here</p>
  </div>
  <img class="hero-photo" id="heroPhoto" src="" alt="Erika Gomez">
  <div class="hero-overlay"></div>

  <div class="hero-content">
    <div class="hero-badge">
      <span class="live-dot"></span>
      <span id="followerCount">458K+ followers</span>
    </div>

    <h1 class="hero-name" id="heroName">Erika<br><em>Gomez</em></h1>
    <p class="hero-handle" id="heroHandle">@erikagomez_92</p>

    <div class="social-row" id="socialRow"></div>

    <a href="#" class="hero-cta" id="heroCta">
      <span>🔥</span>
      <span id="heroCtaText">Free OnlyFans — Entra Gratis</span>
      <span>→</span>
    </a>
  </div>

  <div class="scroll-hint">scroll</div>
</section>

<!-- ── OF CONTENT ── -->
<div class="section fade-up" id="ofSection">
  <div class="section-label">Exclusive Content</div>
  <div class="of-cards" id="ofCards"></div>
</div>

<!-- ── LINKS ── -->
<div class="section fade-up" id="linksSection">
  <div class="section-label">Platforms</div>
  <div class="link-buttons" id="linkButtons"></div>
</div>

<!-- ── GALLERY ── -->
<div class="section fade-up" id="gallerySection">
  <div class="section-label">Photo Gallery</div>
  <div class="gallery-grid" id="galleryGrid"></div>
</div>

<!-- FOOTER -->
<footer class="site-footer" id="siteFooter">© 2025 Erika Gomez · 18+ Only</footer>

<script>
const SOCIAL_ICONS = {
  instagram: { icon: '📸', label: 'Instagram' },
  twitter:   { icon: '𝕏',  label: 'Twitter' },
  tiktok:    { icon: '♪',  label: 'TikTok' },
  telegram:  { icon: '💬', label: 'Telegram' },
  reddit:    { icon: '🤖', label: 'Reddit' },
};

const LINK_COLORS = {
  free_onlyfans: '#E63946',
  vip_onlyfans:  '#C0392B',
  telegram:      '#229ED9',
  twitter:       '#888',
  instagram:     '#E1306C',
  tiktok:        '#EE1D52',
};

const LINK_ICONS = {
  free_onlyfans: '🔥',
  vip_onlyfans:  '👑',
  telegram:      '💬',
  twitter:       '𝕏',
  instagram:     '📸',
  tiktok:        '♪',
};

async function loadContent() {
  let data;
  try {
    const r = await fetch('./content.json?v=' + Date.now());
    data = await r.json();
  } catch(e) {
    data = defaultContent();
  }
  render(data);
}

function render(d) {
  // Hero photo
  if (d.hero_photo) {
    const img = document.getElementById('heroPhoto');
    const ph = document.getElementById('heroPlaceholder');
    img.src = d.hero_photo;
    img.onload = () => { img.classList.add('loaded'); ph.style.display='none'; };
  }

  // Text
  document.getElementById('heroName').innerHTML = d.name_line1 + '<br><em>' + d.name_line2 + '</em>';
  document.getElementById('heroHandle').textContent = d.handle;
  document.getElementById('followerCount').textContent = d.follower_count;
  document.getElementById('heroCtaText').textContent = d.cta_text;
  document.getElementById('siteFooter').textContent = d.footer;

  // CTA link
  const cta = document.getElementById('heroCta');
  cta.href = d.cta_url;

  // Social icons
  const socialRow = document.getElementById('socialRow');
  (d.social_icons || []).filter(s => s.enabled).forEach(s => {
    const info = SOCIAL_ICONS[s.id] || { icon: '🔗', label: s.id };
    const a = document.createElement('a');
    a.href = s.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.className = 'social-icon';
    a.title = info.label;
    a.innerHTML = `<span style="font-size:17px;">${info.icon}</span>`;
    socialRow.appendChild(a);
  });

  // OF Cards
  const ofCards = document.getElementById('ofCards');
  (d.of_cards || []).forEach((card, i) => {
    const a = document.createElement('a');
    a.href = card.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.className = 'of-card' + (i === 0 ? ' primary-card' : '');

    let photoHTML = `<div class="of-card-placeholder shimmer"></div>`;
    if (card.photo) {
      photoHTML = `<img class="of-card-photo" src="${card.photo}" alt="" onload="this.classList.add('loaded')">
                   <div class="of-card-placeholder shimmer" style="position:absolute;inset:0;z-index:0;"></div>`;
    }

    a.innerHTML = `
      ${photoHTML}
      <div class="of-card-badge ${card.badge_gold ? 'gold' : ''}">${card.badge}</div>
      <div class="of-card-blur">
        <div class="of-card-lock">🔥</div>
        <div class="of-card-text">${card.label}</div>
      </div>
    `;
    ofCards.appendChild(a);
  });

  // Link buttons
  const linkButtons = document.getElementById('linkButtons');
  (d.links || []).filter(l => l.enabled && !['instagram','twitter','tiktok','telegram'].includes(l.id)).forEach(l => {
    const a = document.createElement('a');
    a.href = l.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.className = 'link-btn';
    a.style.setProperty('--btn-color', LINK_COLORS[l.id] || '#E63946');
    a.innerHTML = `
      <div class="btn-inner">
        <div class="btn-icon">${LINK_ICONS[l.id] || '🔗'}</div>
        <div>
          <div class="btn-label">${l.label}</div>
          <div class="btn-sub">${l.sublabel}</div>
        </div>
      </div>
      <span class="btn-arrow">→</span>
    `;
    linkButtons.appendChild(a);
  });

  // Gallery
  const grid = document.getElementById('galleryGrid');
  (d.gallery || []).forEach((g, i) => {
    const div = document.createElement('div');
    div.className = 'gallery-item';
    if (g.photo) {
      div.innerHTML = `
        <div class="gallery-placeholder shimmer" style="position:absolute;inset:0;"></div>
        <img class="gallery-photo" src="${g.photo}" alt="" onload="this.classList.add('loaded')">
        <div class="gallery-overlay"></div>
      `;
    } else {
      div.innerHTML = `
        <div class="gallery-placeholder shimmer">
          <span style="font-size:24px;">📷</span>
          <span>Photo ${i+1}</span>
        </div>
      `;
    }
    grid.appendChild(div);
  });
}

// Intersection observer for fade-up
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });

document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

loadContent();
</script>
</body>
</html>
